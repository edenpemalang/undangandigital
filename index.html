<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Undangan Digital - Romeo & Juliet</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/style.css">
</head>
<body>

    <audio id="myAudio" loop>
        <source src="https://www.bensound.com/bensound-music/bensound-love.mp3" type="audio/mpeg">
    </audio>

    <section class="hero">
        <h1 data-aos="fade-up">R & J</h1>
        <p data-aos="fade-up" data-aos-delay="300">The Wedding of Romeo & Juliet</p>
        <a href="#isi" class="btn-open" onclick="playMusic()">Buka Undangan</a>
    </section>

    <div class="content-section" id="isi">
        
        <div class="card" data-aos="zoom-in">
            <h2>Mempelai Pria</h2>
            <p>Romeo Montague</p>
            <p>Putra dari Bpk. Montague & Ibu Montague</p>
        </div>

        <div class="card" data-aos="zoom-in" data-aos-delay="200">
            <h2>Mempelai Wanita</h2>
            <p>Juliet Capulet</p>
            <p>Putri dari Bpk. Capulet & Ibu Capulet</p>
        </div>

        <div class="card" data-aos="fade-right">
            <h2>Waktu & Tempat</h2>
            <p>Sabtu, 28 April 2026</p>
            <p>Gedung Agung, Jakarta</p>
            <a href="https://maps.google.com" class="btn-open">Lihat Lokasi</a>
        </div>

    </div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({ duration: 1200 }); // Inisialisasi animasi scroll

        function playMusic() {
            var audio = document.getElementById("myAudio");
            audio.play();
        }
    </script>
</body>
</html>
